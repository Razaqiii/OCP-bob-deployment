apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: bob-app
  namespace: production
  labels:
    app: bob-app
    component: backend
  annotations:
    description: "External route for Bob application"
    haproxy.router.openshift.io/timeout: "60s"
    haproxy.router.openshift.io/balance: "roundrobin"
spec:
  to:
    kind: Service
    name: bob-app
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

